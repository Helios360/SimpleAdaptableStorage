<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ETAI, un outil collaboratif pour la gestion des ressources, des tâches et des statistiques d'entreprise.">
    <meta name="keywords" content="Cloud privé, collaboration, gestion des documents, productivité, entreprise, ETAI">
    <meta name="author" content="Treguier Elias">
    <meta name="robots" content="noindex, nofollow">
    <title>Cloud-testing</title>
    <script src="/scripts/theme-init.js"></script>
    
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/png" href="/sources/favicon.ico">
    <meta property="og:title" content="Cloud-testing">
    <meta property="og:description" content="Détails du projet cloud-testing : Cloud privé, collaboration, et gestion efficace des ressources.">
    <meta property="og:image" content="assets/preview.png">
    <meta property="og:type" content="website">
</head>
<body>
    <!--header-->
    <main>
        <h3>Veuillez entrer le nouveau mot de passe dans le champ ci-dessous</h3>

        <form class="form" id="sub">
            <div class="forgot">
                <label for="password"></label>
                <input class="inputs" type="password" id="password" name="password" placeholder="password . . ." required>
                <button type="submit">Envoyer</button>
            </div>
        </form>
    </main>
    <!--footer-->
</body>
<script src="/scripts/Main.js" defer></script>
<script defer>
const params = new URLSearchParams(window.location.search);
const email = params.get("email");
const token = params.get("token");
document.getElementById('sub').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!email || !token) notif("Lien de réinitialisation invalide (token/email manquant)");
    const password = e.target.password.value;
    const response = await fetch('/reset/confirm', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ password, email, token })
    });

    const data = await response.json();
    notif(data.message || "Si le mail existe, un lien de reset a été envoyé")
    window.location.href = "/signin";
});
</script>
</html>
