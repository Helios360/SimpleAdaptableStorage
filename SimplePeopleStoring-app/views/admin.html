<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ETAI, un outil collaboratif pour la gestion des ressources, des tâches et des statistiques d'entreprise.">
    <meta name="keywords" content="Cloud privé, collaboration, gestion des documents, productivité, entreprise, ETAI">
    <meta name="author" content="Treguier Elias">
    <meta name="robots" content="noindex, nofollow">

    <title>Cloud-testing</title>
    <script src="/scripts/theme-init.js"></script>

    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/admin.css">
    <link rel="icon" type="image/png" href="/sources/favicon.ico">

    <meta property="og:title" content="Cloud-testing">
    <meta property="og:description" content="Détails du projet cloud-testing : Cloud privé, collaboration, et gestion efficace des ressources.">
    <meta property="og:image" content="assets/preview.png">
    <meta property="og:type" content="website">
</head>
<body>
    <!--header-->
    <span class="gugugaga">
        <a id="addStud" class="action-btn">Ajouter un étudiant</a>
    </span>
    <main>
        <div class="inputInfo">
            <form id="search-form">
            <input placeholder="Nom Prénom" id="nomPrenom" name="name" type="text">
            <select id="searchStatus">
                <option value="" selected>Status</option>
                <option value="archive">Archive</option>
                <option value="recherche">En recherche</option>
                <option value="active">Recherche active</option>
                <option value="entreprise">En entreprise</option>
            </select>
            <span class="place">
                <input type="text" id="place" placeholder="Lieu...">
                <div id="cityDropdown" class="dropdown"></div>
                <input placeholder="Radius" id="radius">
                <input placeholder="Postal" id="postal">
            </span>
            <datalist id="cityList"></datalist>
                <span class="place1">
                <input placeholder="Age" type="number" id="age">
                <select name="tranche-age" id="trancheAge">
                    <option value="" selected>Tranche</option>
                    <option value="0-17">-18</option>
                    <option value="18-20">18 - 20</option>
                    <option value="21-25">21 - 25</option>
                    <option value="26-29">26 - 29</option>
                    <option value="30-100">30+</option>
                </select>
            </span>
            <div class="wrapper" id="tagsWrapper">
            <p>Tags</p>
            <input class="taging" id="add_tags" list="tagList" placeholder=". . .">
              <datalist id="tagList">
                <option value="Eloquence">
                <option value="Optimiste">
                <option value="Curieux">
                <option value="Détérminé">
              </datalist>
            <div class="box" id="tags">
            </div>
          </div>
          <div class="wrapper">
            <p>Compétences</p>
            <input class="taging" id="add_skills" list="skillList" placeholder=". . .">
            <datalist id="skillList"></datalist>
            <div class="box" id="skills"></div>
          </div>
            <span class="checks">
                <a class="action-btn" id="reset">Reset</a>
                <span>
                    <input type="checkbox" id="permis" name="permis">
                    <label for="permis-b">Permis</label>
                </span>
                <span>
                    <input type="checkbox" id="vehicule" name="vehicule">
                    <label for="nomade">Véhiculé</label>
                </span>
                <span>    
                    <input type="checkbox" id="mobile" name="mobile">
                    <label for="nomade">Mobile</label>
                </span>
            </span>
        </form>
    </div>
        <div class="list">
            <div class="header">
                <span id="name-fname">
                    <p>Etudiant</p>
                    <svg width="24" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" stroke="var(--secondary)" stroke-width="1.5" d="m2 15.999 10.173-9.824 9.824 10.173"/>
                    </svg>
                </span>
                <span id="score">
                    <p>Score</p>
                    <svg width="24" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" stroke="var(--secondary)" stroke-width="1.5" d="m2 15.999 10.173-9.824 9.824 10.173"/>
                    </svg>
                </span>
                <span id="localisation">
                    <p>Ville</p>
                    <svg width="24" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" stroke="var(--secondary)" stroke-width="1.5" d="m2 15.999 10.173-9.824 9.824 10.173"/>
                    </svg>
                </span>
                <span id="status">
                    <p>Statut</p>
                    <svg width="24" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" stroke="var(--secondary)" stroke-width="1.5" d="m2 15.999 10.173-9.824 9.824 10.173"/>
                    </svg>
                </span>
                <span id="creation-date">
                    <p>Création</p>
                    <svg width="24" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" stroke="var(--secondary)" stroke-width="1.5" d="m2 15.999 10.173-9.824 9.824 10.173"/>
                    </svg>
                </span>
            </div>
            <div id="list"></div>
            <div class="pages">
                <a id="previous-page"><</a>
                <p id="actual-page">1</p>
                <a id="next-page">></a>
            </div>
        </div>
    </main>
    <!--footer-->
<script src="/scripts/Main.js" defer></script>
<script src="/scripts/admin.js" defer></script>
</body>
</html>
