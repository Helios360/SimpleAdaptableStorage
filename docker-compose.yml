services:
  mysql:
    image: mysql:8.4
    restart: always
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - ${MYSQL_DATA_DIR}:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - interBus

  mysql-backup:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ${NAS_BACKUPS}:/backup
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        trap 'exit 0' TERM INT
        mkdir -p /backup
        while true; do
          TS="$$(date +%F_%H-%M-%S)"
          FILE="/backup/backup_$${TS}.sql.gz"
          if mysqldump -h "$${MYSQL_HOST:-mysql}" -u "$${MYSQL_USER:-root}" -p"$${MYSQL_PASSWORD:-$${MYSQL_ROOT_PASSWORD:-}}" \
            --all-databases --single-transaction --quick --routines --triggers --events | gzip > "$${FILE}"; then
            echo "Backup OK: $${FILE}"
            find /backup -type f -name 'backup_*.sql.gz' -mtime +7 -delete
          else
            echo "Backup FAILED at $${TS}" >&2
          fi
          sleep 43200
        done
    networks:
      - interBus
    healthcheck:
      test: ["CMD-SHELL", "mysql -h $${MYSQL_HOST:-mysql} -u $${MYSQL_USER:-root} -p$${MYSQL_PASSWORD:-$${MYSQL_ROOT_PASSWORD:-}} -e 'SELECT 1'"]
      interval: 60s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./SimplePeopleStoring-app:/usr/src/app
      - /usr/src/app/node_modules
      - ${NAS_UPLOADS}:${APP_UPLOADS_DIR}
    working_dir: /usr/src/app
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/health || curl -fsS http://127.0.0.1:3000 || exit 1"]
      interval: 7s
      timeout: 3s
      retries: 40
    networks:
      - interBus

volumes: {}
networks:
  interBus:
  proxy:
    external: true