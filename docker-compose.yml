services:
  mysql:
      image: mysql:latest
      restart: always
      env_file:
        - .env
      ports:
        - "3307:3306"
      volumes:
        - db-data:/var/lib/mysql
        - ./db/init:/docker-entrypoint-initdb.d:ro
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
        interval: 5s
        timeout: 3s
        retries: 10
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ${UPLOADS_DIR_HOST}:${APP_UPLOADS_DIR}
volumes:
  db-data: