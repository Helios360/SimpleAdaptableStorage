services:
  mysql:
    image: mysql:latest
    restart: always
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - ${DIR_HOST}/mysql:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - interBus

  app:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./SimplePeopleStoring-app:/usr/src/app
      - /usr/src/app/node_modules
      - ${DIR_HOST}/uploads:${APP_UPLOADS_DIR}
    working_dir: /usr/src/app
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/health || curl -fsS http://127.0.0.1:3000 || exit 1"]
      interval: 7s
      timeout: 3s
      retries: 40
    networks:
      - interBus
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`cloudportail.ddns.net`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=le
      - traefik.http.services.app.loadbalancer.server.port=${PORT}

volumes:
  db-data:

networks:
  interBus:
  proxy:
    external: true