# HTTP — keep 80 open for ACME http-01 and redirect to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name helli0s.ddns.net;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS
server {
  listen 443 ssl;          # (on newer nginx, "http2" is a separate directive)
  listen [::]:443 ssl;
  http2 on;                # replaces the deprecated "listen ... http2"
  server_name helli0s.ddns.net;

  ssl_certificate     /etc/letsencrypt/live/helli0s.ddns.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/helli0s.ddns.net/privkey.pem;

  client_max_body_size 15m;

  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}
